- name: Configuration CSR1000
  hosts: csr1000
  gather_facts: false

  tasks:
    # --- INTERFACE GIG1 DHCP ---
    - name: Config IP GigabitEthernet1 DHCP
      cisco.ios.ios_config:
        lines:
          - ip address dhcp
        parents: interface GigabitEthernet1

    # --- INTERFACES STATIQUES ---
    - name: Config IP interfaces statiques
      cisco.ios.ios_l3_interfaces:
        config:
          - name: GigabitEthernet2
            ipv4:
              - address: 192.168.2.1/24
          - name: GigabitEthernet3
            ipv4:
              - address: 192.168.3.1/24
          - name: GigabitEthernet4
            ipv4:
              - address: 192.168.4.1/24
        state: merged

    # --- ACTIVER INTERFACES + DESCRIPTIONS ---
    - name: Activer les interfaces et descriptions
      cisco.ios.ios_interfaces:
        config:
          - name: GigabitEthernet1
            description: WAN
            enabled: true
          - name: GigabitEthernet2
            description: LAN_ENTREPRISE
            enabled: true
          - name: GigabitEthernet3
            description: LAN_DMZ
            enabled: true
          - name: GigabitEthernet4
            description: LAN_ADMIN
            enabled: true
        state: merged

    # --- DHCP ---
    - name: Supprimer pool DHCP existant
      cisco.ios.ios_config:
        lines:
          - no ip dhcp pool LAN_ENTREPRISE

    - name: Config serveur DHCP
      cisco.ios.ios_config:
        lines:
          - network 192.168.2.0 255.255.255.0
          - default-router 192.168.2.1
          - dns-server 8.8.8.8
        parents: ip dhcp pool LAN_ENTREPRISE

    # --- NAT OUTSIDE ---
    - name: NAT outside sur GigabitEthernet1
      cisco.ios.ios_config:
        lines:
          - ip nat outside
        parents: interface GigabitEthernet1

    # --- NAT INSIDE ---
    - name: NAT inside sur interfaces LAN
      cisco.ios.ios_config:
        lines:
          - ip nat inside
        parents: "interface {{ item }}"
      loop:
        - GigabitEthernet2
        - GigabitEthernet3
        - GigabitEthernet4

    # --- PAT DYNAMIQUE ---
    - name: ACL pour NAT
      cisco.ios.ios_config:
        lines:
          - access-list 1 permit 192.168.2.0 0.0.0.255
          - access-list 1 permit 192.168.3.0 0.0.0.255
          - access-list 1 permit 192.168.4.0 0.0.0.255

    - name: Activation PAT dynamique
      cisco.ios.ios_config:
        lines:
          - ip nat inside source list 1 interface GigabitEthernet1 overload

    # --- PAT PAR PORT ---
    - name: PAT port 80 vers serveur web
      cisco.ios.ios_config:
        lines:
          - ip nat inside source static tcp 192.168.3.2 80 interface GigabitEthernet1 80

    - name: PAT port 2222 vers serveur SSH
      cisco.ios.ios_config:
        lines:
          - ip nat inside source static tcp 192.168.4.2 22 interface GigabitEthernet1 2222
