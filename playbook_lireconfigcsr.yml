- name: Lecture config CSR1000
  hosts: csr1000
  gather_facts: false

  tasks:
    - name: Récupère la configuration
      cisco.ios.ios_command:
        commands: show running-config
      register: config

    - name: Sauvegarde la configuration
      copy:
        content: "{{ config.stdout[0] }}"
        dest: "show_run_{{ inventory_hostname }}.txt"
